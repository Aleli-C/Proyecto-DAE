<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Bio-App</title>
    <link rel="stylesheet" href="/css/login.css"> <link rel="stylesheet" href="/css/register.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card fade-in">
            <div class="brand-container">
                <h2>Crear Cuenta</h2>
                <p>Únete a la plataforma de análisis bioinformático</p>
            </div>
            
            <form id="registerForm">
                <div class="input-group">
                    <input type="text" id="reg-user" required placeholder=" ">
                    <label>Nombre de Usuario</label>
                </div>
                
                <div class="input-group">
                    <input type="password" id="reg-pass" required placeholder=" ">
                    <label>Contraseña</label>
                </div>

                <div class="input-group">
                    <input type="password" id="reg-pass-confirm" required placeholder=" ">
                    <label>Confirmar Contraseña</label>
                </div>
                
                <button type="submit" id="regBtn">Registrar Usuario</button>
                
                <div class="footer-links">
                    <p>¿Ya tienes cuenta? <a href="/login">Inicia sesión aquí</a></p>
                </div>
                <p id="reg-msg" class="error-msg"></p>
            </form>
        </div>
    </div>
    <script src="/js/register.js"></script>
</body>
</html>
